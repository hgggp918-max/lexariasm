<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sorgu Panel</title>
<style>
body { background:black; color:#00f0ff; font-family: monospace; }
input,button { padding:10px; margin:5px; background:black; color:#00f0ff; border:1px solid #00f0ff; }
</style>
</head>

<body>

<h2>AD SOYAD SORGU</h2>

<input id="ad" placeholder="Ad">
<input id="soyad" placeholder="Soyad">
<input id="il" placeholder="İl (opsiyonel)">
<input id="ilce" placeholder="İlçe (opsiyonel)">

<br>
<button onclick="sorgu()">SORGULA</button>

<pre id="sonuc"></pre>

<script>

// 🔥 KENDİ VERİ TABANIN (GERÇEK GİBİ)
const database = [
 {ad:"Ahmet", soyad:"Yılmaz", il:"İstanbul", ilce:"Kadıköy"},
 {ad:"Ahmet", soyad:"Yılmaz", il:"Ankara", ilce:"Çankaya"},
 {ad:"Ahmet", soyad:"Yılmaz", il:"İzmir", ilce:"Bornova"},
 {ad:"Mehmet", soyad:"Kaya", il:"Bursa", ilce:"Osmangazi"}
];

// 🔥 TÜRKÇE İSİM KONTROL (SAÇMA İSİM ENGEL)
function gecerliMi(text){
 return /^[a-zA-ZçÇğĞıİöÖşŞüÜ]+$/.test(text);
}

function sorgu(){

 let ad = document.getElementById("ad").value.trim();
 let soyad = document.getElementById("soyad").value.trim();
 let il = document.getElementById("il").value.trim();
 let ilce = document.getElementById("ilce").value.trim();

 if(!ad || !soyad){
  sonuc.innerText = "Ad ve Soyad zorunlu!";
  return;
 }

 if(!gecerliMi(ad) || !gecerliMi(soyad)){
  sonuc.innerText = "Geçersiz isim girdin!";
  return;
 }

 let results = database.filter(x =>
  x.ad.toLowerCase() === ad.toLowerCase() &&
  x.soyad.toLowerCase() === soyad.toLowerCase() &&
  (il ? x.il.toLowerCase() === il.toLowerCase() : true) &&
  (ilce ? x.ilce.toLowerCase() === ilce.toLowerCase() : true)
 );

 if(results.length === 0){
  sonuc.innerText = "Sonuç bulunamadı";
  return;
 }

 sonuc.innerText = JSON.stringify(results, null, 2);
}

</script>

</body>
</html>
